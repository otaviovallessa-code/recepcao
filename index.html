<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CPM - Gerador de Senhas</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --azul-ba: #0b3c66; --vermelho-ba: #d50000; --branco: #ffffff; }
        body { background-color: var(--azul-ba); color: var(--branco); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        header { width: 100%; padding: 20px 0; border-bottom: 4px solid var(--vermelho-ba); text-align: center; background: rgba(0,0,0,0.2); }
        .container { background: var(--branco); padding: 30px; border-radius: 12px; width: 90%; max-width: 600px; color: #333; margin-top: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        label { font-size: 12px; font-weight: bold; color: var(--azul-ba); text-transform: uppercase; display: block; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .btn-gerar { background: var(--vermelho-ba); color: white; border: none; padding: 18px; font-size: 18px; font-weight: bold; width: 100%; border-radius: 6px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        /* Área Admin no Gerador */
        .admin-section { width: 90%; max-width: 600px; margin-top: 30px; display: flex; gap: 10px; }
        .btn-admin { flex: 1; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; }
        .btn-relatorio { background: #28a745; }
        .btn-reset { background: #666; }
    </style>
</head>
<body>
    <header>
        <h1>GOVERNO DO ESTADO DA BAHIA</h1>
        <small>SEC - COORDENAÇÃO DE PROVIMENTO E MOVIMENTAÇÃO</small>
    </header>

    <div class="container">
        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="Digite o nome">
        <div class="row">
            <div style="flex:1"><label>Matrícula</label><input type="text" id="matricula"></div>
            <div style="flex:1"><label>Assunto</label><input type="text" id="assunto"></div>
        </div>
        <div style="margin: 10px 0; font-size: 14px;">
            <input type="radio" name="tipo" value="EFETIVO" checked> EFETIVO 
            <input type="radio" name="tipo" value="REDA"> REDA |
            <input type="checkbox" id="prio"> <b>PRIORITÁRIO</b>
        </div>
        <button class="btn-gerar" onclick="gerarSenha()">Gerar Senha de Atendimento</button>
    </div>

    <div class="admin-section">
        <button class="btn-admin btn-relatorio" onclick="exportarRelatorio()">📊 BAIXAR RELATÓRIO DO DIA</button>
        <button class="btn-admin btn-reset" onclick="resetarSistema()">♻️ ZERAR SISTEMA</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://sistemacpm-dd706-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function gerarSenha() {
            const nome = document.getElementById('nome').value.toUpperCase();
            if(!nome) return alert("Insira o nome");
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            const ehPrio = document.getElementById('prio').checked;

            db.ref('atendimentos').once('value', snap => {
                const total = snap.numChildren() + 1;
                const prefixo = ehPrio ? "P" : (tipo === "INTERNO" ? "I" : tipo[0]);
                const senha = prefixo + String(total).padStart(3, '0');

                db.ref('atendimentos').push({
                    senha, nome, tipo, prioridade: ehPrio,
                    assunto: document.getElementById('assunto').value.toUpperCase() || "GERAL",
                    matricula: document.getElementById('matricula').value || "---",
                    status: "AGUARDANDO", hora: new Date().toLocaleTimeString(), timestamp: Date.now()
                });
                document.getElementById('nome').value = "";
                alert("Senha Gerada: " + senha);
            });
        }

        function exportarRelatorio() {
            db.ref('atendimentos').once('value', snap => {
                let csv = "\ufeffSenha;Nome;Tipo;Assunto;Hora\n";
                snap.forEach(c => { const d = c.val(); csv += `${d.senha};${d.nome};${d.tipo};${d.assunto};${d.hora}\n`; });
                const blob = new Blob([csv], { type: 'text/csv' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'Relatorio_Atendimento.csv';
                a.click();
            });
        }

        function resetarSistema() {
            if(confirm("Deseja apagar todos os dados?") && prompt("Senha:") === "123") {
                db.ref('atendimentos').remove();
                db.ref('senha_atual').remove();
                location.reload();
            }
        }
    </script>
</body>
</html>
