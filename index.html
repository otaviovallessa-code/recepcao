<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CPM - Gerador de Senhas</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --azul-ba: #0b3c66; --vermelho-ba: #d50000; --branco: #ffffff; }
        body { background-color: var(--azul-ba); color: var(--branco); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        header { width: 100%; max-width: 800px; text-align: center; border-bottom: 4px solid var(--vermelho-ba); padding-bottom: 15px; margin-bottom: 25px; }
        .container-form { background: var(--branco); padding: 30px; border-radius: 12px; width: 100%; max-width: 650px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        label { font-size: 11px; font-weight: bold; color: var(--azul-ba); text-transform: uppercase; display: block; margin-bottom: 4px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        .row { display: flex; gap: 15px; }
        .row div { flex: 1; }
        .options { background: #f4f7f6; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #ddd; }
        .btn-gerar { background: var(--vermelho-ba); color: white; border: none; padding: 20px; font-size: 18px; font-weight: bold; width: 100%; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-gerar:hover { background: #b30000; transform: scale(1.01); }
        
        /* Lista */
        .lista-container { width: 100%; max-width: 800px; margin-top: 40px; }
        .tabela-senhas { width: 100%; background: white; color: #333; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        .tabela-senhas th { background: #eee; padding: 12px; text-align: left; color: var(--azul-ba); font-size: 12px; }
        .tabela-senhas td { padding: 12px; border-bottom: 1px solid #ddd; font-size: 14px; }

        /* Rodapé Admin */
        .admin-footer { margin-top: 40px; display: flex; gap: 15px; width: 100%; max-width: 650px; padding-bottom: 50px; }
        .btn-admin { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-relatorio { background: #28a745; }
        .btn-reset { background: #555; }
        .btn-admin:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0">GOVERNO DO ESTADO DA BAHIA</h1>
        <div style="font-size:14px; opacity:0.9">SEC - COORDENAÇÃO DE PROVIMENTO E MOVIMENTAÇÃO</div>
    </header>

    <div class="container-form">
        <label>Nome Completo do Requerente</label>
        <input type="text" id="nome" placeholder="Digite o nome completo">

        <div class="row">
            <div>
                <label>Matrícula ou CPF</label>
                <input type="text" id="matricula" placeholder="Digite o documento">
            </div>
            <div>
                <label>Telefone</label>
                <input type="text" id="telefone" placeholder="(71) 90000-0000" maxlength="15">
            </div>
        </div>

        <label>Assunto / Tipo de Atendimento</label>
        <input type="text" id="assunto" placeholder="Ex: DOSSIÊ, RECADASTRAMENTO">

        <div class="options">
            <label style="margin-bottom:8px">Tipo de Vínculo e Prioridade</label>
            <input type="radio" name="tipo" value="EFETIVO" checked> Efetivo 
            <input type="radio" name="tipo" value="REDA" style="margin-left:15px"> REDA
            <input type="radio" name="tipo" value="INTERNO" style="margin-left:15px"> Interno
            <hr style="border:0; border-top:1px solid #ddd; margin:10px 0">
            <input type="checkbox" id="prio"> <b style="color:var(--vermelho-ba)">ATENDIMENTO PRIORITÁRIO</b>
        </div>

        <button class="btn-gerar" onclick="gerarSenha()">Emitir Senha de Atendimento</button>
    </div>

    <div class="lista-container">
        <h3 style="border-left: 5px solid var(--vermelho-ba); padding-left: 10px;">Senhas em Espera</h3>
        <table class="tabela-senhas">
            <thead>
                <tr><th>SENHA</th><th>NOME</th><th>ASSUNTO</th><th>HORA</th></tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>

    <div class="admin-footer">
        <button class="btn-admin btn-relatorio" onclick="exportarRelatorio()">📊 RELATÓRIO DO DIA</button>
        <button class="btn-admin btn-reset" onclick="resetarSistema()">♻️ ZERAR SISTEMA</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://sistemacpm-dd706-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Máscaras
        document.getElementById('telefone').addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        // Removida a máscara rígida de matrícula para permitir CPF e quantidades variadas de dígitos

        function gerarSenha() {
            const campos = {
                nome: document.getElementById('nome'),
                mat: document.getElementById('matricula'),
                tel: document.getElementById('telefone'),
                ass: document.getElementById('assunto'),
                prio: document.getElementById('prio')
            };

            if(!campos.nome.value) return alert("Por favor, preencha o nome!");

            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            
            db.ref('atendimentos').once('value', snap => {
                const total = snap.numChildren() + 1;
                const prefixo = campos.prio.checked ? "P" : (tipo === "INTERNO" ? "I" : tipo[0]);
                const senha = prefixo + String(total).padStart(3, '0');

                db.ref('atendimentos').push({
                    senha,
                    nome: campos.nome.value.toUpperCase(),
                    tipo,
                    prioridade: campos.prio.checked,
                    matricula: campos.mat.value || "---",
                    telefone: campos.tel.value || "---",
                    assunto: campos.ass.value.toUpperCase() || "GERAL",
                    status: "AGUARDANDO",
                    hora: new Date().toLocaleTimeString(),
                    timestamp: Date.now()
                }).then(() => {
                    // Limpeza completa dos campos
                    campos.nome.value = "";
                    campos.mat.value = "";
                    campos.tel.value = "";
                    campos.ass.value = "";
                    campos.prio.checked = false;
                    alert("Senha Gerada: " + senha);
                });
            });
        }

        // Lista em Tempo Real
        db.ref('atendimentos').on('value', snap => {
            let html = "";
            snap.forEach(c => {
                const d = c.val();
                if(d.status === "AGUARDANDO") {
                    html += `<tr><td><b style="color:var(--vermelho-ba)">${d.senha}</b></td><td>${d.nome}</td><td>${d.assunto}</td><td>${d.hora}</td></tr>`;
                }
            });
            document.getElementById('corpo-tabela').innerHTML = html || '<tr><td colspan="4" style="text-align:center">Ninguém aguardando</td></tr>';
        });

        // Função de Relatório
        function exportarRelatorio() {
            db.ref('atendimentos').once('value', snap => {
                let csv = "\ufeffSenha;Nome;Matricula;Tipo;Assunto;Telefone;Hora;Status\n";
                snap.forEach(c => { 
                    const d = c.val(); 
                    csv += `${d.senha};${d.nome};${d.matricula};${d.tipo};${d.assunto};${d.telefone};${d.hora};${d.status}\n`; 
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.setAttribute("download", "Relatorio_CPM_Bahia.csv");
                link.click();
            });
        }

        // Função de Reset
        function resetarSistema() {
            if(confirm("ATENÇÃO: Deseja realmente apagar todos os dados do dia?") && prompt("Digite a senha de admin:") === "123") {
                db.ref('atendimentos').remove();
                db.ref('senha_atual').remove();
                alert("Sistema resetado!");
                location.reload();
            }
        }
    </script>
</body>
</html>
