<style>
    /* Estilo para os Contadores */
    .dashboard-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
        width: 100%;
        max-width: 900px;
        margin-bottom: 25px;
    }
    .stat-card {
        background: var(--branco);
        color: var(--azul-governo);
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        border-bottom: 4px solid var(--vermelho-governo);
    }
    .stat-number { font-size: 28px; font-weight: bold; display: block; color: var(--vermelho-governo); }
    .stat-label { font-size: 11px; text-transform: uppercase; font-weight: 700; opacity: 0.8; }
</style>

<body>
    <header>
        <h1>GOVERNO DO ESTADO DA BAHIA</h1>
        <h2>COORDENAÇÃO DE PROVIMENTO E MOVIMENTAÇÃO</h2>
        <div class="badge-sec">SEC - TRIAGEM ATENDIMENTO ONLINE</div>
    </header>

    <div class="dashboard-stats">
        <div class="stat-card"><span id="count-total" class="stat-number">0</span><span class="stat-label">Total Atendidos</span></div>
        <div class="stat-card"><span id="count-efetivo" class="stat-number">0</span><span class="stat-label">Efetivos</span></div>
        <div class="stat-card"><span id="count-reda" class="stat-number">0</span><span class="stat-label">REDA</span></div>
        <div class="stat-card"><span id="count-prio" class="stat-number">0</span><span class="stat-label">Prioridades</span></div>
        <div class="stat-card"><span id="count-interno" class="stat-number">0</span><span class="stat-label">Internos</span></div>
    </div>

    <div class="form-container">
        <div class="field-group"><label>Nome do Requerente</label><input type="text" id="nome" placeholder="Digite o nome completo"></div>
        <div style="display:flex; gap:15px;">
            <div class="field-group" style="flex:1;"><label>Matrícula</label><input type="text" id="matricula" placeholder="00.000.000"></div>
            <div class="field-group" style="flex:1;"><label>Telefone</label><input type="text" id="telefone" placeholder="(71) 90000-0000"></div>
        </div>
        <div class="field-group"><label>Assunto / Tipo de Atendimento</label><input type="text" id="assunto" placeholder="Ex: Dossiê, Recadastramento"></div>
        
        <div class="radio-section">
            <div class="radio-group"><label>Vínculo</label><div style="margin-top:5px; font-size:12px;">
                <input type="radio" name="tipo" value="EFETIVO" checked> EFETIVO 
                <input type="radio" name="tipo" value="REDA"> REDA
                <input type="radio" name="tipo" value="INTERNO"> INT.
            </div></div>
            <div class="radio-group" style="border: 1px solid #ffeeba;"><label style="color: #856404;">Prioritário?</label><div style="margin-top:5px; font-size:12px;">
                <input type="radio" name="prio" value="SIM"> SIM 
                <input type="radio" name="prio" value="NAO" checked> NÃO
            </div></div>
        </div>
        <button class="btn-acao" onclick="gerarSenha()">Gerar Senha de Atendimento</button>
    </div>

    <div class="fila-box">
        <div style="font-weight:bold; color:var(--azul-governo); border-left:5px solid var(--vermelho-governo); padding-left:15px; margin-bottom:15px;">Fila em Tempo Real (Nuvem)</div>
        <div id="fila-display"></div>
    </div>

    <div style="width: 100%; max-width: 900px; display: flex; gap: 10px; margin: 20px 0 50px 0;">
        <button onclick="gerarRelatorio()" style="flex: 1; background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px;">📊 BAIXAR RELATÓRIO DO DIA (EXCEL)</button>
        <button onclick="limparFilaTotal()" style="flex: 1; background: #d50000; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px;">♻️ ZERAR TUDO (NOVO DIA)</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://sistemacpm-dd706-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // LÓGICA DE ATUALIZAÇÃO DA FILA E CONTADORES
        db.ref('atendimentos').on('value', snap => {
            let html = '<div class="fila-item header-fila"><span>Senha</span><span>Nome</span><span>Assunto</span><span>Hora</span></div>';
            let contAtivos = 0;
            
            // Variáveis de estatística
            let stats = { total: 0, efetivo: 0, reda: 0, prio: 0, interno: 0 };

            snap.forEach(c => {
                const p = c.val();
                
                // Se o status for ATENDIDO ou CHAMADO, conta nas estatísticas
                if(p.status !== "AGUARDANDO") {
                    stats.total++;
                    if(p.prioridade) stats.prio++;
                    if(p.tipo === "EFETIVO") stats.efetivo++;
                    if(p.tipo === "REDA") stats.reda++;
                    if(p.tipo === "INTERNO") stats.interno++;
                }

                // Se estiver AGUARDANDO, mostra na lista visual
                if(p.status === "AGUARDANDO") {
                    html += `<div class="fila-item"><b class="${p.prioridade ? 'senha-prio' : ''}">${p.senha}</b><span>${p.nome}</span><span>${p.assunto}</span><span>${p.hora}</span></div>`;
                    contAtivos++;
                }
            });

            // Atualiza Dashboard
            document.getElementById('count-total').innerText = stats.total;
            document.getElementById('count-efetivo').innerText = stats.efetivo;
            document.getElementById('count-reda').innerText = stats.reda;
            document.getElementById('count-prio').innerText = stats.prio;
            document.getElementById('count-interno').innerText = stats.interno;

            document.getElementById('fila-display').innerHTML = contAtivos > 0 ? html : "Ninguém aguardando na fila.";
        });

        function gerarSenha() {
            const nome = document.getElementById('nome').value.trim().toUpperCase();
            if(!nome) return alert("Informe o nome!");
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            const ehPrio = document.querySelector('input[name="prio"]:checked').value === "SIM";

            db.ref('atendimentos').once('value', snap => {
                const total = snap.numChildren() + 1;
                const prefixo = ehPrio ? "P" : (tipo === "INTERNO" ? "I" : tipo[0]);
                const senha = prefixo + String(total).padStart(3, '0');

                db.ref('atendimentos').push({
                    senha, nome, tipo, prioridade: ehPrio,
                    matricula: document.getElementById('matricula').value || "---",
                    assunto: document.getElementById('assunto').value.toUpperCase() || "GERAL",
                    status: "AGUARDANDO", timestamp: Date.now(),
                    hora: new Date().toLocaleTimeString()
                });
                document.getElementById('nome').value = "";
                document.getElementById('nome').focus();
            });
        }

        function gerarRelatorio() {
            db.ref('atendimentos').once('value', snap => {
                let csv = "Senha;Nome;Matricula;Assunto;Tipo;Prioridade;Status;Hora Chamado\n";
                snap.forEach(child => {
                    const d = child.val();
                    csv += `${d.senha};${d.nome};${d.matricula};${d.assunto};${d.tipo};${d.prioridade ? 'SIM' : 'NAO'};${d.status};${d.hora}\n`;
                });
                const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Relatorio_CPM_${new Date().toLocaleDateString().replace(/\//g, '-')}.csv`);
                link.click();
            });
        }

        function limparFilaTotal() {
            if (confirm("⚠️ Isso apagará TODOS os dados de hoje. Confirmar reset para novo dia?")) {
                const pass = prompt("Senha de Administrador:");
                if (pass === "123") {
                    db.ref('atendimentos').remove();
                    db.ref('senha_atual').remove();
                    alert("Sistema reiniciado!");
                }
            }
        }
    </script>
</body>
