<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        textarea { width: 300px; height: 100px; margin: 15px 0; padding: 10px; border-radius: 8px; }
        button { background: #d50000; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>EDITAR LETREIRO TV</h2>
        <textarea id="texto" placeholder="Digite o aviso..."></textarea><br>
        <button onclick="enviar()">ATUALIZAR PAINEL ONLINE</button>
    </div>
    <script>
        const firebaseConfig = { databaseURL: "https://sistemacpm-dd706-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        function enviar() {
            const txt = document.getElementById('texto').value;
            if(txt) firebase.database().ref('configuracoes/letreiro').set(txt).then(() => alert("Atualizado!"));
        }
    </script>
</body>
</html>
