<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel TV Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0b3c66; color: white; font-family: Arial; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; margin: 0; }
        .box { background: rgba(0,0,0,0.3); padding: 50px; border-radius: 30px; border: 10px solid #d50000; text-align: center; width: 80%; }
        .senha { font-size: 200px; font-weight: bold; color: #ff0000; }
        .nome { font-size: 70px; }
        .aviso { position: absolute; bottom: 0; width: 100%; background: #d50000; padding: 20px; font-size: 30px; white-space: nowrap; overflow: hidden; }
        .scroll { display: inline-block; animation: scroll 15s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <div class="box">
        <div style="font-size: 40px;">SENHA ATUAL</div>
        <div id="senha" class="senha">---</div>
        <div id="nome" class="nome">Aguardando...</div>
    </div>
    <div class="aviso"><div id="letreiro" class="scroll">Bem-vindo ao Sistema CPM - SEC</div></div>
    <audio id="som"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const firebaseConfig = { databaseURL: "https://sistemacpm-dd706-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let lastTs = 0;

        db.ref('senha_atual').on('value', snap => {
            const d = snap.val();
            if(d && d.timestamp !== lastTs) {
                document.getElementById('senha').innerText = d.senha;
                document.getElementById('nome').innerText = d.nome;
                document.getElementById('som').play();
                const v = new SpeechSynthesisUtterance("Senha " + d.senha + ". " + d.nome);
                v.lang = 'pt-BR'; window.speechSynthesis.speak(v);
                lastTs = d.timestamp;
            }
        });

        db.ref('configuracoes/letreiro').on('value', snap => {
            if(snap.val()) document.getElementById('letreiro').innerText = snap.val();
        });
    </script>
</body>
</html>
