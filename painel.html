<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel TV - CPM Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0b3c66; color: white; font-family: Arial; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { display: flex; justify-content: space-between; padding: 15px 30px; background: rgba(0,0,0,0.3); border-bottom: 3px solid #ff0000; font-size: 24px; }
        .main { display: grid; grid-template-columns: 3fr 1fr; flex-grow: 1; }
        .chamada { display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 5px solid #ff0000; }
        .senha { font-size: 200px; font-weight: bold; color: #ff0000; margin: 0; }
        .nome { font-size: 60px; text-transform: uppercase; }
        .historico { background: #092d4d; padding: 20px; }
        .marquee { background: #000; color: #ffeb3b; padding: 15px; font-size: 24px; font-weight: bold; white-space: nowrap; overflow: hidden; border-top: 3px solid #ff0000; }
        .scroll { display: inline-block; animation: scroll 30s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <div class="header">
        <div>SISTEMA CPM - BAHIA</div>
        <div id="relogio">00:00:00</div>
    </div>
    <div class="main">
        <div class="chamada">
            <div style="font-size:40px">SENHA</div>
            <div id="senha" class="senha">---</div>
            <div id="nome" class="nome">Aguardando...</div>
            <div id="assunto" style="font-size:30px; background:#d50000; padding:10px 40px; border-radius:50px; margin-top:20px">SECRETARIA DA EDUCAÇÃO</div>
        </div>
        <div class="historico">
            <h2 style="border-bottom:2px solid #ff0000">ÚLTIMAS</h2>
            <div id="lista-hist"></div>
        </div>
    </div>
    <div class="marquee"><div id="letreiro" class="scroll">Carregando notícias da Educação Bahia...</div></div>
    <audio id="som"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const firebaseConfig = { databaseURL: "https://sistemacpm-dd706-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let lastTs = 0;

        // Atualiza Senha e Voz
        db.ref('senha_atual').on('value', snap => {
            const d = snap.val();
            if(d && d.timestamp !== lastTs) {
                document.getElementById('senha').innerText = d.senha;
                document.getElementById('nome').innerText = d.nome;
                document.getElementById('assunto').innerText = d.assunto;
                document.getElementById('som').play();
                const v = new SpeechSynthesisUtterance(`Senha ${d.senha}. ${d.nome}`);
                v.lang = 'pt-BR'; window.speechSynthesis.speak(v);
                
                const item = `<div style="font-size:25px; margin-bottom:15px"><b style="color:#ff0000">${d.senha}</b><br>${d.nome.split(' ')[0]}</div>`;
                document.getElementById('lista-hist').innerHTML = item + document.getElementById('lista-hist').innerHTML;
                lastTs = d.timestamp;
            }
        });

        // Relógio e Notícias RSS
        setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);
        
        async function getNoticias() {
            try {
                const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.ba.gov.br/educacao/noticias/rss.xml');
                const data = await res.json();
                document.getElementById('letreiro').innerText = data.items.map(i => " ● " + i.title.toUpperCase()).join(' ');
            } catch { document.getElementById('letreiro').innerText = "CONECTADO AO SERVIDOR CPM - SECRETARIA DA EDUCAÇÃO BAHIA"; }
        }
        getNoticias(); setInterval(getNoticias, 600000);
    </script>
</body>
</html>
